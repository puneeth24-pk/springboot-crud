<!DOCTYPE html>
<html>

<head>

    <title>Student Management</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:750px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            padding:10px;
            margin:5px;
        }

        button{
            padding:8px 12px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .addBtn{background:green;color:white;}
        .updateBtn{background:orange;color:white;}
        .deleteBtn{background:red;color:white;}

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid gray;
            padding:10px;
        }

        footer{
            margin-top:20px;
            color:gray;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>SPRING BOOT CRUD Application</h2>

    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="dept" placeholder="Department">

    <br>

    <button class="addBtn" onclick="addStudent()">Add Student</button>

    <table>

        <thead>

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<footer>

    <p>puneeth@creates</p>

</footer>

<script>

    const API="/students";

    function loadStudents(){

        fetch(API)
            .then(res=>res.json())
            .then(data=>{

                let rows="";

                data.forEach(student=>{

                    rows+=`
<tr>

<td>${student.name}</td>
<td>${student.age}</td>
<td>${student.department}</td>

<td>

<button class="updateBtn" onclick="updateStudent('${student.id}')">
Update
</button>

<button class="deleteBtn" onclick="deleteStudent('${student.id}')">
Delete
</button>

</td>

</tr>
`;

                });

                document.getElementById("studentTable").innerHTML=rows;

            });

    }

    function addStudent(){

        const student={
            name:document.getElementById("name").value,
            age:parseInt(document.getElementById("age").value),
            department:document.getElementById("dept").value
        };

        fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(student)
        })
            .then(()=>loadStudents());

    }

    function deleteStudent(id){

        fetch(API+"/"+id,{
            method:"DELETE"
        })
            .then(()=>loadStudents());

    }

    function updateStudent(id){

        const name=prompt("Enter new name");
        const age=prompt("Enter new age");
        const dept=prompt("Enter new department");

        const student={
            id:id,
            name:name,
            age:parseInt(age),
            department:dept
        };

        fetch(API,{
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(student)
        })
            .then(()=>loadStudents());

    }

    loadStudents();

</script>

</body>
</html>
