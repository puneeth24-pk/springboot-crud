<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            padding:10px;
            margin:5px;
        }

        button{
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid gray;
            padding:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>SPRING BOOT STUDENT CRUD APP/h2>

    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="dept" placeholder="Department">

    <button onclick="addStudent()">Add Student</button>

    <table>

        <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<script>

    const API="http://localhost:8080/students";

    function loadStudents(){

        fetch(API)
            .then(res=>res.json())
            .then(data=>{

                let table="";

                data.forEach(student=>{

                    table+=`
<tr>
<td>${student.name}</td>
<td>${student.age}</td>
<td>${student.department}</td>

<td>
<button onclick="deleteStudent('${student.id}')">
Delete
</button>
</td>

</tr>
`;

                });

                document.getElementById("studentTable").innerHTML=table;

            });

    }

    function addStudent(){

        const student={
            name:document.getElementById("name").value,
            age:parseInt(document.getElementById("age").value),
            department:document.getElementById("dept").value
        };

        fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(student)
        })
            .then(()=>loadStudents());

    }

    function deleteStudent(id){

        fetch(API+"/"+id,{
            method:"DELETE"
        })
            .then(()=>loadStudents());

    }

    loadStudents();

</script>

</body>
</html>
